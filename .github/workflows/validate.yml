# Single `validate` job: this is the required status check that gates `main`
# (see ci_check_contexts = ["validate"] in the infrastructure repo's github.tf).
# Renaming this job will break branch protection and the deploy workflow's gate.
name: Validate

on:
  pull_request:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"

jobs:
  validate:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == 'validate')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: React with eyes
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Validate commenter permissions
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(
                `@${context.payload.comment.user.login} does not have write access.`
              );
            }

      - name: Get PR details for comment trigger
        if: github.event_name == 'issue_comment'
        id: comment-pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            if (pr.state !== 'open') {
              core.setFailed('This PR is not open.');
              return;
            }
            core.setOutput('ref', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.comment-pr.outputs.ref || '' }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # ── Prettier (formatting) ───────────────────────────────────
      - name: Run Prettier check
        id: prettier
        run: |
          set +e
          OUTPUT=$(npx --yes prettier@3.8.3 --no-color --check . 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── htmltest (link & image validation) ──────────────────────
      - name: Install htmltest
        run: |
          curl -fsSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin htmltest

      - name: Run htmltest
        id: htmltest
        run: |
          set +e
          OUTPUT=$(htmltest 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── pa11y-ci (accessibility, WCAG 2.1 AA) ───────────────────
      - name: Run pa11y-ci
        id: pa11y
        run: |
          npx --yes serve@14 public -l 8080 --no-clipboard &
          SERVER_PID=$!
          sleep 2
          set +e
          OUTPUT=$(npx --yes pa11y-ci@4.1.0 2>&1)
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -40
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Content smoke test ──────────────────────────────────────
      - name: Smoke test
        id: smoke
        run: |
          ERRORS=""
          HP="public/index.html"
          [ -f "$HP" ] || ERRORS="${ERRORS}Missing public/index.html\n"
          grep -qF "4001 Mossy Bank Lane" "$HP" || ERRORS="${ERRORS}Missing address text\n"
          for id in hero-heading gallery tour details location contact; do
            grep -qF "id=\"$id\"" "$HP" || ERRORS="${ERRORS}Missing section id: $id\n"
          done
          grep -qF "my.matterport.com" "$HP" || ERRORS="${ERRORS}Missing Matterport tour embed\n"
          grep -qF "application/ld+json" "$HP" || ERRORS="${ERRORS}Missing JSON-LD structured data\n"
          grep -qF "gallery-item" "$HP" || ERRORS="${ERRORS}Missing gallery items\n"
          [ -f public/404.html ] || ERRORS="${ERRORS}Missing public/404.html\n"
          [ -f public/robots.txt ] || ERRORS="${ERRORS}Missing public/robots.txt\n"
          [ -f public/sitemap.xml ] || ERRORS="${ERRORS}Missing public/sitemap.xml\n"
          if [ -n "$ERRORS" ]; then
            printf '%b' "$ERRORS"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            { echo "output<<GHEOF"; printf '%b' "$ERRORS"; echo "GHEOF"; } >> "$GITHUB_OUTPUT"
          else
            echo "All smoke checks passed."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            { echo "output<<GHEOF"; echo "All smoke checks passed."; echo "GHEOF"; } >> "$GITHUB_OUTPUT"
          fi

      # ── Placeholder reminder (non-blocking) ─────────────────────
      # Warns (does NOT fail) if go-live sentinels are still present, so the
      # scaffold can deploy with placeholders but nobody forgets to fill them in.
      - name: Placeholder reminder
        if: always()
        run: |
          HP="public/index.html"
          if grep -qF "REPLACE_WITH_MODEL_ID" "$HP"; then
            echo "::warning file=public/index.html::Matterport tour still has the REPLACE_WITH_MODEL_ID placeholder; paste your real tour URL before go-live."
          fi
          if grep -qF 'og:image" content="https://4001mossy.com/images/og-cover.svg' "$HP"; then
            echo "::warning file=public/index.html::Social-card image is still the SVG placeholder; most platforms won't render an SVG og:image; add a 1200x630 JPG/PNG before go-live."
          fi

      # ── Gitleaks (secret detection) ─────────────────────────────
      - name: Install Gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        id: gitleaks
        run: |
          set +e
          OUTPUT=$(gitleaks git --log-opts="--all" --no-banner 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── actionlint (workflow validation) ────────────────────────
      - name: Run actionlint
        id: actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest /usr/local/bin
          set +e
          OUTPUT=$(actionlint -no-color 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -20
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Aggregate & comment ─────────────────────────────────────
      - name: Collect results
        id: results
        if: always()
        env:
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.smoke.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
        run: |
          PASS=0
          FAIL=0
          for code in "$EXIT_PRETTIER" "$EXIT_HTMLTEST" "$EXIT_PA11Y" "$EXIT_SMOKE" "$EXIT_GITLEAKS" "$EXIT_ACTIONLINT"; do
            if [ "$code" = "0" ]; then PASS=$((PASS + 1)); else FAIL=$((FAIL + 1)); fi
          done
          {
            echo "pass=$PASS"
            echo "fail=$FAIL"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PASS_COUNT: ${{ steps.results.outputs.pass }}
          FAIL_COUNT: ${{ steps.results.outputs.fail }}
          COMMENT_PR_SHA: ${{ steps.comment-pr.outputs.sha }}
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.smoke.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
          OUTPUT_PRETTIER: ${{ steps.prettier.outputs.output }}
          OUTPUT_HTMLTEST: ${{ steps.htmltest.outputs.output }}
          OUTPUT_PA11Y: ${{ steps.pa11y.outputs.output }}
          OUTPUT_SMOKE: ${{ steps.smoke.outputs.output }}
          OUTPUT_GITLEAKS: ${{ steps.gitleaks.outputs.output }}
          OUTPUT_ACTIONLINT: ${{ steps.actionlint.outputs.output }}
        with:
          script: |
            const marker = '<!-- validation-results -->';
            const prSha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : process.env.COMMENT_PR_SHA;
            const sha = (prSha || '').substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pass = process.env.PASS_COUNT;
            const fail = process.env.FAIL_COUNT;
            const allPassed = fail === '0';

            const banner = allPassed
              ? '✅ **All checks passed**. Comment `deploy` to deploy and merge.'
              : `❌ **${fail} failure(s)**. Review the details below. All checks must pass before this PR can be merged.`;

            const st = (code) => (code === '0' ? '✅' : '❌');

            const rows = [
              ['Code Formatting', 'prettier', process.env.EXIT_PRETTIER, process.env.OUTPUT_PRETTIER],
              ['Link & Image Validation', 'htmltest', process.env.EXIT_HTMLTEST, process.env.OUTPUT_HTMLTEST],
              ['Accessibility (WCAG 2.1 AA)', 'pa11y-ci', process.env.EXIT_PA11Y, process.env.OUTPUT_PA11Y],
              ['Content Smoke Test', 'smoke', process.env.EXIT_SMOKE, process.env.OUTPUT_SMOKE],
              ['Secret Detection', 'gitleaks', process.env.EXIT_GITLEAKS, process.env.OUTPUT_GITLEAKS],
              ['Workflow Validation', 'actionlint', process.env.EXIT_ACTIONLINT, process.env.OUTPUT_ACTIONLINT],
            ];

            const table = [
              '| Check | Tool | Result |',
              '|:------|:-----|:------:|',
              ...rows.map(([name, tool, code]) => `| **${name}** | \`${tool}\` | ${st(code)} |`),
            ].join('\n');

            const details = rows
              .map(([name, tool, , output]) =>
                [
                  `<details><summary><strong>${name}</strong> (<code>${tool}</code>)</summary>`,
                  '',
                  '```',
                  (output || 'No output').trim(),
                  '```',
                  '',
                  '</details>',
                ].join('\n'),
              )
              .join('\n\n');

            const body = [
              marker,
              '# Validation Report',
              '',
              banner,
              '',
              `**Commit:** \`${sha}\` | **Run:** [#${context.runNumber}](${runUrl}) | **Results:** ${pass} passed, ${fail} failed`,
              '',
              '---',
              '',
              table,
              '',
              '---',
              '',
              details,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Final gate ──────────────────────────────────────────────
      - name: Check for failures
        if: always()
        env:
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.smoke.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
        run: |
          FAILED=0
          [ "$EXIT_PRETTIER" != "0" ] && echo "::error::Prettier found formatting issues" && FAILED=1
          [ "$EXIT_HTMLTEST" != "0" ] && echo "::error::htmltest failed" && FAILED=1
          [ "$EXIT_PA11Y" != "0" ] && echo "::error::pa11y-ci accessibility check failed" && FAILED=1
          [ "$EXIT_SMOKE" != "0" ] && echo "::error::Content smoke test failed" && FAILED=1
          [ "$EXIT_GITLEAKS" != "0" ] && echo "::error::Gitleaks detected potential secrets" && FAILED=1
          [ "$EXIT_ACTIONLINT" != "0" ] && echo "::error::actionlint failed" && FAILED=1
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
